<!DOCTYPE html>
<html>
    <!--
        state를 세팅하는 데는 2가지 방법이 있다.
    1) 직접 할당 :setState(state +1)
    2)함수를 할당:setState(state => state +1) (함수의 첫번째 인자는 현재 state 이다)

    현재 state랑 관련이 없는 값을 새로운 state로 하고싶은 경우에는 (1),
    현재 state에 조금의 변화를 주어서 새로운 state를 주고 싶은 경우에는 (2)
    -->
    <body>
        <div id="root"></div>
    </body>
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const root = document.getElementById("root");
        function App() {
            const [counter, setCounter] = React.useState(0);
                //setCounter(counter + 1);
            const onClick = () => {
                setCounter((current) => current + 1);
                //위 방법은 setCounter에 함수를 넣는 방법 
                //함수의 첫 값은 argument의 현재 값. return값이 새로운 값이 되는것. = 새로운 state가 되는것임. 이는 현재 state값을 기준으로 나타내기에 적함한 코드임.
            };
            return(
                <div>
                    <h3>Total clicks: { counter }</h3>
                    <button onClick={onClick }>Click me</button>
                </div>
            );
        }
        ReactDOM.render(<App />, root);
    </script>
</html>
