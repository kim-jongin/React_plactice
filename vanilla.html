<!DOCTYPE html>
<html>
    <body>
        <div id="root"></div>
    </body>
    <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    
    <script>
        const root = document.getElementById("root");
        const span = React.createElement(
            "span", 
            { id: "great-span", style: { color: "red" } }, 
            "hello i'm jongin"
            );  
            // React JS로 element생성 + 두번째 argument에는 span의 property를 줄 수 있다. (class, id 등등) + 세번째 argument에는 content를 둘 수 있다.

        //React를 선언했기 때문에, createElement함수를 가진 React object에 접근이 가능

        ReactDOM.createRoot(root).render(span);
        //span을 root안에 render해라
    </script>
</html>
